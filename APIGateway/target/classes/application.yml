server:
  port: 8083

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: data-service
          uri: http://localhost:8084  
          predicates:
            - Path=/api/pipes/** 
          filters:
          - StripPrefix=1 # Удаляет первый уровень пути (например, /api)
        - id: ui-service
          uri: http://localhost:8082
          predicates:
            - Path=/, /reqvestPage/**
        - id: analysis-service
          uri: http://localhost:8000 
          predicates:
            - Path=/api/analyze-defects 
          filters:
            - StripPrefix=1 # Удаляет первый уровень пути (например, /api)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"