server:
  port: 8083

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: data-service
          uri: http://localhost:8084  # ← Указываем URI DataService
          predicates:
            - Path=/api/pipes/**          # ← Все запросы, начинающиеся с /pipes/
        - id: ui-service
          uri: http://localhost:8082
          predicates:
            - Path=/, /reqvestPage/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"